# ~/.hammerspoon/config.toml
#
# Workspace manager config. Loaded by init.lua at startup and on reload
# (cmd+ctrl+r). A parse error fails loud; this file is never rewritten by
# the manager.

# ---------------------------------------------------------------------------
# Profiles: named display layouts keyed by EDID UUID (or "builtin").
# Multiple roles may point to the same key (laptop-only collapses all to
# builtin). Profile matching uses the SET of unique UUID values — so
# laptop-only matches when exactly one screen (builtin) is present.
# ---------------------------------------------------------------------------

[profiles.home-desk]
LEFT   = "6203E2B2-F23E-4A39-A42E-0DA93E56D196"   # DELL U2419HC
CENTRE = "C8F12309-1B94-4BC8-86DB-9F61C1F15087"   # DELL U2723QE
LAPTOP = "builtin"                                 # Retina XDR

[profiles.laptop-only]
LEFT   = "builtin"
CENTRE = "builtin"
LAPTOP = "builtin"

# ---------------------------------------------------------------------------
# Spaces: named workspaces. role = which display role this space lives on.
# ---------------------------------------------------------------------------

[spaces.Scratch]
role = "CENTRE"
apps = ["org.hammerspoon.Hammerspoon"]

[spaces.Coding]
role = "CENTRE"
apps = ["com.mitchellh.ghostty", "com.jimbarritt.marq"]

[spaces.Coding.layout]
type  = "sidebars"
main  = "com.mitchellh.ghostty"
ratio = 0.70

[spaces.Reference]
role = "CENTRE"
apps = ["notion.id", "app.zen-browser.zen", "com.google.Chrome"]

[spaces.Meetings]
role = "CENTRE"
apps = [
  "us.zoom.xos",
  "com.apple.facetime",
  "com.microsoft.teams2",
  "com.google.Chrome.app.kjgfgldnnfoeklkmfkjfagphfepbbdan",  # Google Meet (Chrome PWA)
]

[spaces.Schedule]
role = "CENTRE"
apps = [
  "com.google.Chrome.app.kjbdgfilnfhdoflbpgamdcdgpehopbep",  # Google Calendar (Chrome PWA)
]

[spaces.Slack]
role = "LAPTOP"
apps = ["com.tinyspeck.slackmacgap"]

# ---------------------------------------------------------------------------
# Defaults: which space is active on each role, per profile.
# Applied at startup and whenever the profile changes (monitors plugged in/out).
# LEFT omitted from home-desk — starts empty until you push a space there.
# ---------------------------------------------------------------------------

[defaults.laptop-only]
LAPTOP = "Coding"

[defaults.home-desk]
CENTRE = "Coding"
LAPTOP = "Slack"

# ---------------------------------------------------------------------------
# Hotkeys: cmd+opt+key activates a space.
# ---------------------------------------------------------------------------

[[hotkeys]]
mods  = "cmd alt"
key   = "0"
space = "Scratch"

[[hotkeys]]
mods  = "cmd alt"
key   = "1"
space = "Coding"

[[hotkeys]]
mods  = "cmd alt"
key   = "2"
space = "Reference"

[[hotkeys]]
mods  = "cmd alt"
key   = "3"
space = "Meetings"

[[hotkeys]]
mods  = "cmd alt"
key   = "4"
space = "Schedule"

[[hotkeys]]
mods  = "cmd alt"
key   = "a"
space = "Slack"
