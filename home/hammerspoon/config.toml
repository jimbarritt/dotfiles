# ~/.hammerspoon/config.toml
#
# Workspace manager config. Loaded by init.lua at startup and on reload
# (cmd+alt+r). A parse error fails loud; this file is never rewritten by
# the manager.

# ---------------------------------------------------------------------------
# Screens: maps display UUIDs to logical names.
# builtin is auto-detected and always named "laptop".
# precedence: determines migration direction when a monitor is unplugged.
#   Going DOWN the chain (losing a more-important screen) → active space travels.
#   Going UP (losing a less-important screen) → active space hides, destination keeps its own.
# ---------------------------------------------------------------------------

[screens]
precedence = ["external-main", "external-secondary", "laptop"]
"C8F12309-1B94-4BC8-86DB-9F61C1F15087" = "external-main"       # DELL U2723QE
"6203E2B2-F23E-4A39-A42E-0DA93E56D196" = "external-secondary"  # DELL U2419HC

# ---------------------------------------------------------------------------
# Spaces: named workspaces.
# prefer: ordered list of screen names — space lives on first one that is present.
# ---------------------------------------------------------------------------

[spaces.Scratch]
prefer = ["external-main", "laptop"]
apps   = ["org.hammerspoon.Hammerspoon"]

[spaces.Coding]
prefer = ["external-main", "laptop"]
apps   = ["com.mitchellh.ghostty", "com.jimbarritt.marq"]

[spaces.Coding.layout]
type  = "sidebars"
main  = "com.mitchellh.ghostty"
ratio = 0.70

[spaces.Reference]
prefer = ["external-main", "external-secondary", "laptop"]
apps   = ["notion.id", "app.zen-browser.zen", "com.google.Chrome"]

[spaces.Meetings]
prefer = ["external-main", "laptop"]
apps   = [
  "us.zoom.xos",
  "com.apple.facetime",
  "com.microsoft.teams2",
  "com.google.Chrome.app.kjgfgldnnfoeklkmfkjfagphfepbbdan",
]

[spaces.Schedule]
prefer = ["external-main", "laptop"]
apps   = [
  "com.google.Chrome.app.kjbdgfilnfhdoflbpgamdcdgpehopbep",
]

[spaces.Slack]
prefer = ["laptop"]
apps   = ["com.tinyspeck.slackmacgap"]

# ---------------------------------------------------------------------------
# Defaults: which space activates on each screen at startup / on screen connect.
# laptop-only overrides apply when no external screens are present.
# ---------------------------------------------------------------------------

[defaults]
external-main      = "Coding"
external-secondary = ""
laptop             = "Slack"

[defaults.laptop-only]
laptop = "Coding"

# ---------------------------------------------------------------------------
# Hotkeys: cmd+opt+key activates a space.
# ---------------------------------------------------------------------------

[[hotkeys]]
mods  = "cmd alt"
key   = "0"
space = "Scratch"

[[hotkeys]]
mods  = "cmd alt"
key   = "1"
space = "Coding"

[[hotkeys]]
mods  = "cmd alt"
key   = "2"
space = "Reference"

[[hotkeys]]
mods  = "cmd alt"
key   = "3"
space = "Meetings"

[[hotkeys]]
mods  = "cmd alt"
key   = "4"
space = "Schedule"

[[hotkeys]]
mods  = "cmd alt"
key   = "a"
space = "Slack"
