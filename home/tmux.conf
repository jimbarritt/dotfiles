
set -g status on
set -g mouse on
set -g mode-keys vi
# Blinking block cursor (tmux 3.4+)
set -g cursor-style blinking-block

set -g pane-border-format "#{?pane_active,#[reverse],}#{pane_index}#[default]"

# Split panes open in the same directory as the current pane
# Uses a pane user option (@pane_pwd) set by the shell's chpwd hook,
# which preserves symlink paths (unlike #{pane_current_path}).
bind-key '"' split-window -v -c "#{@pane_pwd}"
bind-key %   split-window -h -c "#{@pane_pwd}"

bind-key b set-option status
bind-key f display-popup -E -w 60 -h 20 "$HOME/bin/tmux-sessionizer"
bind-key ? run-shell 'tmux display-popup -E -w 60 -h 30 "$HOME/bin/key-help #{pane_current_command}"'

# New session: Ctrl-b n prompts for name, creates and switches to it
bind-key a command-prompt -p "New session:" "new-session -s '%%'"
unbind-key n
bind-key k confirm-before -p "Kill session #S? (y/n)" "switch-client -n \; kill-session -t '#{session_name}'"

# Sessions in status bar
set -g status-left "#(~/bin/tmux-session-list '#{session_name}')  "
set -g status-left-length 100
set -g status-right " #W | pane #P (#{pane_current_command}) "
# Don't auto-rename windows — keep whatever name was set manually
set -g automatic-rename off
# Name the first window "home" when a new session is created
set-hook -g after-new-session 'rename-window "home"'
set -g status-justify left

# Hide window list
set -g window-status-format ""
set -g window-status-current-format ""

# Status bar colours
set -g status-style "bg=#122912,fg=#4a7c4a"
set -g message-style "bg=#1a3a1a,fg=#7ab87a"
set -g popup-style "bg=#0d1f1a,fg=#c8d8d0"
set -g popup-border-style "bg=#0d1f1a,fg=#4a6860"
# popup-style and popup-border-style are also set dynamically by
# bin/presentation-mode when toggling light/dark themes

# Increase display time for window info (Ctrl-b i)
set -g display-time 3000

# Mouse selection — highlight freely, don't auto-copy or jump to prompt on release
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X stop-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection
# Press y in copy mode to copy selection to clipboard
bind-key -T copy-mode    y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Full terminal capability support
set -g default-terminal "tmux-256color"
# True colour (24-bit RGB) for xterm-based terminals (covers ghostty's xterm-ghostty TERM)
set -as terminal-overrides ',xterm*:Tc'
# True colour for kitty (kept in case of switching back)
set -as terminal-overrides ',xterm-kitty:Tc'
# Italic start/end sequences — many terminfo entries don't advertise these correctly
set -as terminal-overrides ',*:sitm=\E[3m'
set -as terminal-overrides ',*:ritm=\E[23m'
# Extended underline styles (curly, dotted etc) and underline colour — required by neovim
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
