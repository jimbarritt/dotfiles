
set -g status on
set -g mouse on

set -g pane-border-format "#{?pane_active,#[reverse],}#{pane_index}#[default]"

bind-key b set-option status
bind-key ? run-shell 'tmux display-popup -E -w 60 -h 30 "$HOME/bin/key-help.sh #{pane_current_command}"'

# New session: Ctrl-b n prompts for name, creates and switches to it
bind-key a command-prompt -p "New session:" "new-session -s '%%'"
unbind-key n
bind-key k confirm-before -p "Kill session #S? (y/n)" "switch-client -n \; kill-session -t '#{session_name}'"

# Sessions in status bar
set -g status-left "#(~/bin/tmux-session-list.sh '#{session_name}')  "
set -g status-left-length 100
set -g status-right ""
set -g status-justify left

# Hide window list
set -g window-status-format ""
set -g window-status-current-format ""

# Status bar colours
set -g status-style "bg=#122912,fg=#4a7c4a"
set -g message-style "bg=#1a3a1a,fg=#7ab87a"

# Increase display time for window info (Ctrl-b i)
set -g display-time 3000

# Full terminal capability support
set -g default-terminal "tmux-256color"
# True colour (24-bit RGB) for xterm-based terminals (covers ghostty's xterm-ghostty TERM)
set -as terminal-overrides ',xterm*:Tc'
# True colour for kitty (kept in case of switching back)
set -as terminal-overrides ',xterm-kitty:Tc'
# Italic start/end sequences — many terminfo entries don't advertise these correctly
set -as terminal-overrides ',*:sitm=\E[3m'
set -as terminal-overrides ',*:ritm=\E[23m'
# Extended underline styles (curly, dotted etc) and underline colour — required by neovim
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
# Cursor style passthrough — lets apps set cursor shape/blink through tmux to the terminal
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[0 q'
